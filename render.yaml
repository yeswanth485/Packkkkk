services:
  # ─── BACKEND (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: packai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python ../ml_engine/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: packai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ML_MODEL_PATH
        value: ../ml_engine/packaging_model.pkl
      - key: SHIPPING_RATE_PER_KG
        value: "45.0"
      - key: DIM_WEIGHT_DIVISOR
        value: "5000.0"
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── FRONTEND (Next.js) ──────────────────────────────────────────────────────
  - type: web
    name: packai-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: packai-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: packai-backend
          type: web
          property: host

# ─── POSTGRESQL DATABASE ─────────────────────────────────────────────────────
databases:
  - name: packai-db
    plan: free
    databaseName: packaging_db
    user: packai_user
